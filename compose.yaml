services:
  mysql-db:
    image: mysql:8
    environment:
        MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
        MYSQL_PASSWORD: ${DB_PASSWORD}
        MYSQL_DATABASE: demo
        MYSQL_USER: ${DB_USER}
    volumes:
      - mysql-data:/var/lib/mysql
  app:
    build: .
    ports:
        - "8080:8080"
    environment:
        DB_USER: ${DB_USER}
        DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
        - mysql-db

volumes:
  mysql-data:

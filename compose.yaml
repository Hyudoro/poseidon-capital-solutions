networks:
    app-net:
        driver: bridge
services:
  mysql-db:
    networks:
        - app-net
    image: mysql:8
    environment:
        MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
        MYSQL_PASSWORD: ${DB_PASSWORD}
        MYSQL_DATABASE: demo
        MYSQL_USER: ${DB_USER}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
        test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER}", "-p${DB_PASSWORD}"]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 30s
  app:
    networks:
        - app-net
    build: .
    ports:
        - "8080:8080"
    environment:
        DB_USER: ${DB_USER}
        DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
        mysql-db:
            condition: service_healthy
    restart: on-failure

volumes:
  mysql-data:
